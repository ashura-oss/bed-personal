<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Realmforge</title>
    <link rel="stylesheet" href="./css/global.css" />
    <link rel="stylesheet" href="./css/game-ui.css" />
    <link rel="stylesheet" href="./css/animations.css" />
    <script type="module" src="./js/auth.js"></script>
    <script type="module" src="./js/loader.js"></script>
  </head>
  <body data-page="login">
    <div class="game-loader" data-game-loader role="status" aria-live="polite">
      <div class="game-loader-shard" aria-hidden="true"></div>
      <h1 class="game-loader-title">Realmforge</h1>
      <p class="game-loader-lore" data-game-loader-lore>Awakening the Worldheart shards.</p>
    </div>
    <canvas class="ambient-canvas" data-particles aria-hidden="true"></canvas>

    <div class="app-shell auth-shell">
      <header class="topbar">
        <a class="brand-mark" href="./index.html" aria-label="Realmforge home">
          <span class="worldheart-mark" aria-hidden="true"></span>
          <span>
            <strong>Realmforge</strong>
            <small>Shards of the Worldheart</small>
          </span>
        </a>

        <nav class="main-nav" aria-label="Primary navigation">
          <a href="./register.html">Register</a>
          <a href="./dashboard.html">Dashboard</a>
        </nav>
      </header>

      <main class="auth-layout">
        <section class="auth-card game-panel" aria-labelledby="login-title">
          <div class="worldheart-large" aria-hidden="true"></div>
          <p class="eyebrow">Return to Hearthmere</p>
          <h1 id="login-title">Login</h1>

          <div class="alert alert-info" data-auth-shell-message>
            Enter your guild credentials to return to Hearthmere.
          </div>

          <form class="stack" data-auth-form="login" novalidate>
            <label class="field">
              <span>Username</span>
              <input type="text" name="username" autocomplete="username" />
            </label>

            <label class="field">
              <span>Password</span>
              <input type="password" name="password" autocomplete="current-password" />
            </label>

            <button class="btn btn-primary" type="submit">Enter Realm</button>
          </form>

          <p class="form-link">No profile yet? <a href="./register.html">Register</a></p>
        </section>
      </main>
    </div>
  </body>
</html>
