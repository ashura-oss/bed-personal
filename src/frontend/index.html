<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Starter Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="shell">
    <header class="hero">
      <p class="eyebrow">Backend Template</p>
      <h1>API Starter Dashboard</h1>
      <p class="subtitle">This page now checks core API health and gives quick links
        for your next steps.</p>
    </header>

    <section class="panel">
      <div class="panel-head">
        <h2>Service Status</h2>
        <button id="refresh-btn" type="button">Refresh</button>
      </div>

      <div id="health-card" class="health-card" aria-live="polite">
        <p class="label">Health endpoint</p>
        <p id="health-status" class="status loading">Checking...</p>
        <p id="health-message" class="message">Waiting for response from /api/health</p>
      </div>

      <p id="last-checked" class="meta">Last checked: not yet</p>
    </section>

    <section class="panel quick-links">
      <h2>Quick Links</h2>
      <div class="link-grid">
        <a href="/api/health" target="_blank" rel="noopener noreferrer">Open /api/health</a>
        <a href="/api-docs" target="_blank" rel="noopener noreferrer">Open Swagger docs</a>
      </div>
    </section>
  </main>

  <script src="main.js" defer></script>
</body>

</html>
